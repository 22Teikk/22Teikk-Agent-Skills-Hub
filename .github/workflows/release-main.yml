name: Release on main (major bump)

# Every push to main (i.e. every PR merge) publishes a new MAJOR version
# tag + GitHub Release — e.g. 2.3.0 -> 3.0.0.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release.yml
    with:
      bump: major
    secrets: inherit
